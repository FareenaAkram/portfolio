<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Fareena Akram</title>
    <script>
      // GitHub Pages SPA redirect: forward any unknown path back to index.html
      // so React Router can handle it client-side.
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 2).join('/') +
        '/?p=' + encodeURIComponent(l.pathname.slice(1)) + l.search + l.hash
      );
    </script>
  </head>
  <body></body>
</html>
